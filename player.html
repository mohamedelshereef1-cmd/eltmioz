<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <title>لوحة الطالب | أكاديمية التميز</title>
    <style>
        :root { --accent: #0d9488; --dark-bg: #020617; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: white; overflow-x: hidden; }
        
        .sidebar { 
            position: fixed; top: 0; right: -100%; width: 320px; height: 100vh; 
            background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(20px);
            z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column;
        }
        .sidebar.active { right: 0; }
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 1999; display: none; backdrop-filter: blur(4px);
        }
        .overlay.active { display: block; }
        
        .glass-step {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px; transition: 0.4s; cursor: pointer;
        }
        .glass-step:hover { transform: scale(1.03); border-color: var(--accent); box-shadow: 0 10px 30px rgba(13, 148, 136, 0.2); }

        .menu-btn {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: var(--accent); width: 50px; height: 50px;
            border-radius: 15px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 5px; cursor: pointer;
        }
        .menu-btn span { width: 25px; height: 3px; background: white; border-radius: 5px; }

        .back-btn {
            background: rgba(255,255,255,0.05); padding: 10px 25px; border-radius: 15px;
            font-weight: bold; display: none; margin-bottom: 25px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .back-btn:hover { background: var(--accent); }

        /* ستايل كارت الفيديو ليشبه تطبيقات الموبايل */
        .video-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            border-radius: 24px; padding: 20px; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .video-card::before {
            content: "▶"; position: absolute; left: 20px; bottom: 20px;
            font-size: 40px; opacity: 0.1; color: var(--accent);
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-950 z-[5000] flex items-center justify-center">
        <div class="text-teal-500 font-bold animate-pulse text-xl">جاري تحميل الأكاديمية...</div>
    </div>

    <div class="menu-btn" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar shadow-2xl" id="sidebar">
        <div class="p-8 flex flex-col h-full text-right">
            <div class="text-center mb-8">
                <div id="userAvatar" class="w-24 h-24 bg-slate-800 rounded-3xl mx-auto mb-4 flex items-center justify-center text-4xl border-4 border-teal-500/20 overflow-hidden shadow-2xl">👤</div>
                <h2 class="text-xl font-black text-white" id="sideStudentName">بطلنا</h2>
                <p id="stat-studentCode" class="text-teal-400 text-sm font-bold mt-1">---</p>
            </div>
            <div class="mt-auto">
                <button onclick="logout()" class="w-full p-4 rounded-2xl bg-red-500/10 text-red-500 font-bold border border-red-500/10">🚪 تسجيل الخروج</button>
            </div>
        </div>
    </aside>

    <main class="p-6 lg:p-12 pt-24 text-right max-w-7xl mx-auto">
        <header class="mb-10">
            <h1 class="text-4xl lg:text-6xl font-black mb-4 text-white">أهلاً بك، <span class="text-teal-500" id="welcomeName">بطلنا</span></h1>
            <p class="text-slate-400 text-lg font-bold" id="pageDescription">اختر المرحلة الدراسية</p>
        </header>

        <button id="backBtn" class="back-btn" onclick="goBack()">🔙 العودة للخلف</button>
        <div id="view-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        // --- 1. إدارة المسار والذاكرة (Refresh Protection) ---
        let currentPath = JSON.parse(sessionStorage.getItem('academyPath')) || { 
            year: null, subject: null, teacher: null, class: null 
        };

        function saveState() {
            sessionStorage.setItem('academyPath', JSON.stringify(currentPath));
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // --- 2. عرض المحتوى ---
        function displayMainContent() {
            const container = document.getElementById('view-content');
            const backBtn = document.getElementById('backBtn');
            const desc = document.getElementById('pageDescription');
            
            let db = { years: [], subjects: [], teachers: [], chapters: [], lectures: [] };
            try {
                db = JSON.parse(localStorage.getItem('academyDB')) || db;
            } catch (e) { console.error("DB Error"); }
            
            container.innerHTML = "";
            saveState();

            // المستوى 1: السنوات
            if (!currentPath.year) {
                backBtn.style.display = "none";
                desc.innerText = "بوابة الأكاديمية - اختر السنة الدراسية";
                db.years.forEach(year => {
                    container.innerHTML += `<div class="glass-step p-10" onclick="selectStep('year', '${year.id}')"><div class="text-5xl mb-6">🗓️</div><h3 class="text-3xl font-black">${year.name}</h3></div>`;
                });
            } 
            // المستوى 2: المواد
            else if (!currentPath.subject) {
                backBtn.style.display = "block";
                desc.innerText = "اختر المادة العلمية";
                db.subjects.filter(s => s.yearId == currentPath.year).forEach(sub => {
                    container.innerHTML += `<div class="glass-step p-10" onclick="selectStep('subject', '${sub.id}')"><div class="text-5xl mb-6">📚</div><h3 class="text-3xl font-black">${sub.name}</h3></div>`;
                });
            }
            // المستوى 3: المدرسين
            else if (!currentPath.teacher) {
                backBtn.style.display = "block";
                desc.innerText = "اختر المدرس";
                db.teachers.filter(t => t.subId == currentPath.subject).forEach(teach => {
                    container.innerHTML += `<div class="glass-step p-10 text-center" onclick="selectStep('teacher', '${teach.id}')"><div class="w-24 h-24 bg-slate-800 rounded-full mx-auto mb-4 flex items-center justify-center overflow-hidden border-2 border-teal-500">👨‍🏫</div><h3 class="text-2xl font-black">${teach.name}</h3></div>`;
                });
            }
            // المستوى 4: الفصول
            else if (!currentPath.class) {
                backBtn.style.display = "block";
                desc.innerText = "اختر الفصل الدراسي";
                db.chapters.filter(c => c.teachId == currentPath.teacher).forEach(chap => {
                    container.innerHTML += `<div class="glass-step p-10" onclick="selectStep('class', '${chap.id}')"><div class="text-5xl mb-6">📁</div><h3 class="text-2xl font-black">${chap.name}</h3></div>`;
                });
            }
            // المستوى 5: المحاضرات (الربط مع المشغل)
            else {
                backBtn.style.display = "block";
                desc.innerText = "المحاضرات المتاحة";
                db.lectures.filter(l => l.chapId == currentPath.class).forEach(lec => {
                    container.innerHTML += `
                        <div class="video-card glass-step cursor-pointer" onclick="playLesson('${lec.video}', '${lec.title}')">
                            <div class="flex items-start justify-between">
                                <div class="bg-teal-500/20 p-3 rounded-2xl text-teal-400">🎬</div>
                                <span class="text-[10px] bg-white/10 px-2 py-1 rounded-lg">MP4</span>
                            </div>
                            <h3 class="text-xl font-black mt-4 mb-2">${lec.title}</h3>
                            <p class="text-xs text-slate-400">اضغط للتشغيل في المشغل الذكي</p>
                        </div>`;
                });
            }
        }

        function selectStep(step, id) {
            currentPath[step] = id;
            displayMainContent();
        }

        function goBack() {
            if (currentPath.class) currentPath.class = null;
            else if (currentPath.teacher) currentPath.teacher = null;
            else if (currentPath.subject) currentPath.subject = null;
            else if (currentPath.year) currentPath.year = null;
            displayMainContent();
        }

        // --- 3. دالة التشغيل المربوطة بالمشغل الاحترافي ---
        function playLesson(videoFile, title) {
            if (!videoFile) {
                alert("عذراً، هذا الملف غير متوفر حالياً.");
                return;
            }
            localStorage.setItem('lastLessonName', title);
            
            // الربط مع player.html
            const encodedVideo = encodeURIComponent(videoFile);
            const encodedTitle = encodeURIComponent(title);
            window.location.href = `player.html?video=${encodedVideo}&title=${encodedTitle}`;
        }

        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user) { window.location.href = 'login.html'; return null; }
            document.getElementById('loadingOverlay').style.display = 'none';
            return user;
        }

        function updateUI() {
            const user = checkAuth();
            if(!user) return;
            document.getElementById('sideStudentName').innerText = user.name || "بطلنا";
            document.getElementById('welcomeName').innerText = user.name || "بطلنا";
            document.getElementById('stat-studentCode').innerText = "كود: " + (user.code || "---");
            displayMainContent();
        }

        function logout() {
            localStorage.removeItem('currentUser');
            sessionStorage.removeItem('academyPath');
            window.location.href = 'login.html';
        }

        window.onload = updateUI;
    </script>
</body>
</html>
