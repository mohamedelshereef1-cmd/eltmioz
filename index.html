<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <title>لوحة الطالب | أكاديمية التميز</title>
    <style>
        :root { --accent: #0d9488; --dark-bg: #020617; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: white; overflow-x: hidden; }

        .sidebar {
            position: fixed; top: 0; right: -100%; width: 320px; height: 100vh;
            background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(20px);
            z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; overflow-y: auto; scrollbar-width: none;
        }
        .sidebar::-webkit-scrollbar { display: none; }
        .sidebar.active { right: 0; }

        .sidebar-content { display: flex; flex-direction: column; min-height: 100%; padding: 2rem; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1999; display: none; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }

        .glass-step {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px; transition: 0.35s; cursor: pointer;
        }
        .glass-step:hover { transform: translateY(-4px) scale(1.01); border-color: rgba(13,148,136,.55); box-shadow: 0 20px 50px rgba(0,0,0,0.35); }

        .menu-btn {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: var(--accent); width: 50px; height: 50px;
            border-radius: 15px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 5px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(13, 148, 136, 0.3);
        }
        .menu-btn span { width: 25px; height: 3px; background: white; border-radius: 5px; transition: 0.3s; }

        #settingsModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px); z-index: 3000;
            display: none; align-items: center; justify-content: center;
        }
        #settingsModal.show { display: flex; }

        .last-lesson-gradient { background: linear-gradient(135deg, #0d9488 0%, #059669 100%); }

        input#newNameInput {
            background: #000000 !important;
            color: #ffffff !important;
            border: 2px solid rgba(255,255,255,0.2) !important;
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: bold;
            display: none;
            margin-bottom: 20px;
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .back-btn:hover { background: rgba(13,148,136,.35); border-color: rgba(13,148,136,.55); }

        /* ✅ تحسينات عرض المحاضرات/الخطوات بدون تغيير كبير للشكل */
        .step-icon {
            width: 56px; height: 56px;
            display:flex; align-items:center; justify-content:center;
            border-radius: 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 14px;
            font-size: 28px;
        }

        .lecture-card {
            position: relative;
            overflow: hidden;
        }
        .lecture-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 0%, rgba(13,148,136,.22), transparent 40%);
            pointer-events: none;
        }
        .lecture-meta {
            font-size: 12px;
            color: rgba(148,163,184,1);
            font-weight: 800;
        }
        .lecture-btn {
            width: 100%;
            background: rgba(2,6,23,0.9);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 12px 14px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 12px;
            transition: .2s;
        }
        .lecture-btn:hover { transform: translateY(-1px); border-color: rgba(13,148,136,.55); box-shadow: 0 10px 25px rgba(13,148,136,.15); }
        .lecture-disabled { opacity:.55; cursor:not-allowed; }
        .lecture-disabled:hover { transform:none; box-shadow:none; }

        .empty-box {
            text-align: center;
            padding: 60px 20px;
            border-radius: 26px;
            border: 2px dashed rgba(255,255,255,0.10);
            color: rgba(148,163,184,1);
            font-weight: 900;
            background: rgba(255,255,255,0.02);
        }

        /* ✅ تحسين شاشة استكمال آخر محاضرة */
        .resume-note {
            font-size: 11px;
            color: rgba(255,255,255,0.85);
            font-weight: 800;
            margin-top: 6px;
        }
    </style>
</head>

<body class="min-h-screen">

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-950 z-[5000] flex items-center justify-center">
        <div class="text-teal-500 font-bold animate-pulse text-xl">جاري التحقق من الأمان...</div>
    </div>

    <div class="menu-btn" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div id="settingsModal">
        <div class="bg-slate-900 border border-white/20 p-8 rounded-3xl w-full max-w-md mx-4 text-right shadow-2xl">
            <h2 class="text-2xl font-black mb-6 text-white flex items-center gap-2">⚙️ إعدادات الحساب</h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">الصورة الشخصية</label>
                    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="processImage(this)">
                    <button onclick="document.getElementById('fileInput').click()" class="w-full bg-white/5 border border-dashed border-white/20 p-6 rounded-2xl text-sm font-bold text-slate-300">📷 تغيير الصورة</button>
                    <button onclick="removeProfilePic()" id="removePicBtn" class="mt-2 text-xs text-red-400 w-full hidden font-bold">🗑️ حذف الصورة</button>
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="saveProfile()" class="flex-1 bg-teal-600 py-4 rounded-xl font-black text-white hover:bg-teal-500 transition-all">حفظ التغييرات</button>
                    <button onclick="closeSettings()" class="px-6 bg-white/10 py-4 rounded-xl font-bold text-white transition-all">إلغاء</button>
                </div>
            </div>
        </div>
    </div>

    <aside class="sidebar shadow-2xl" id="sidebar">
        <div class="sidebar-content">
            <div class="text-center mt-6">
                <div id="userAvatar" class="w-24 h-24 bg-slate-800 rounded-3xl mx-auto mb-4 flex items-center justify-center text-4xl border-4 border-teal-500/20 overflow-hidden shadow-2xl">👤</div>
                <h2 class="text-xl font-black text-white" id="sideStudentName">بطل الأكاديمية</h2>
                <p id="studentRank" class="text-teal-400 text-sm font-bold tracking-widest mt-1">—</p>
                <p id="expiryInfo" class="text-[10px] text-red-400 font-bold mt-2 uppercase"></p>
            </div>

            <div class="space-y-3 mt-8">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-right">
                    <p class="text-slate-400 text-[10px] font-bold uppercase">كود التفعيل الخاص بك</p>
                    <h3 class="text-lg font-black text-blue-400" id="stat-studentCode">----</h3>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-right">
                        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-tighter">إجمالي المحاضرات</p>
                        <h3 class="text-xl font-black text-white" id="stat-lessons">0</h3>
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-right">
                        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-tighter">المحفظة</p>
                        <h3 class="text-xl font-black text-white" id="stat-wallet">--</h3>
                    </div>
                </div>
            </div>

            <div class="last-lesson-gradient p-5 rounded-3xl border border-white/20 text-right mt-6">
                <p class="text-[10px] font-bold text-white/90 mb-1">آخر محاضرة شاهدتها:</p>
                <h4 class="font-black text-white text-sm leading-tight mb-2" id="lastLessonName">لا توجد دروس</h4>
                <p class="resume-note" id="lastLessonMeta"></p>
                <button onclick="resumeLastLesson()" class="w-full bg-slate-950 text-white py-3 rounded-xl font-black text-[10px]">▶ إكمال المشاهدة</button>
            </div>

            <hr class="border-white/5 my-6">

            <div class="space-y-3">
                <button onclick="window.location.href='support.html'" class="w-full p-4 rounded-2xl bg-teal-500/10 hover:bg-teal-500/20 text-teal-500 text-right flex items-center gap-3 transition-all border border-teal-500/10">
                    <span>🎧</span> <span class="font-bold text-sm">الدعم الفني والشكاوى</span>
                </button>
                <button onclick="openSettings()" class="w-full p-4 rounded-2xl bg-white/5 hover:bg-white/10 text-right flex items-center gap-3 transition-all border border-white/5">
                    <span>⚙️</span> <span class="font-bold text-sm text-white">إعدادات الحساب</span>
                </button>
            </div>

            <div class="mt-auto pt-8 mb-4">
                <button onclick="logout()" class="w-full p-4 rounded-2xl bg-red-500/10 text-red-500 text-right flex items-center gap-3 font-bold text-sm border border-red-500/10 hover:bg-red-500/20 transition-all">
                    <span>🚪</span> تسجيل الخروج
                </button>
            </div>
        </div>
    </aside>

    <main class="p-6 lg:p-12 pt-24 text-right max-w-7xl mx-auto">
        <header class="mb-10">
            <h1 class="text-4xl lg:text-6xl font-black mb-4 text-white">أهلاً، <span class="text-teal-500" id="welcomeName">بطلنا</span></h1>
            <p class="text-slate-400 text-lg font-bold" id="pageDescription">بوابة الأكاديمية - اختر السنة الدراسية</p>
        </header>

        <button id="backBtn" class="back-btn" onclick="goBack()">🔙 العودة للخلف</button>
        <div id="view-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        // ==== Cloudinary public name (مش Secret) ====
        const CLOUD_NAME = "dmjxn80mz";

        // ==== State ====
        let academyDB = { years: [], subjects: [], teachers: [], chapters: [], lectures: [] };
        let student = null;

        // ✅ جديد: تقييد المسار على شعبة الطالب
        // هنستخدم student.trackId (لو موجود) أو student.yearId (لو عندك)
        // المنطق: بعد login، الطالب يتقفل على سنة/شعبة محددة ولا يقدر يغيرها
        let lockedYearId = null;

        let currentPath = { year: null, subject: null, teacher: null, class: null };

        // ===== UI toggles =====
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function openSettings() {
            toggleSidebar();
            document.getElementById('settingsModal').classList.add('show');
            if(localStorage.getItem('studentPic')) document.getElementById('removePicBtn').classList.remove('hidden');
        }
        function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }

        let uploadedImageBase64 = "";
        function processImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    uploadedImageBase64 = e.target.result;
                    alert("✅ تم اختيار الصورة");
                };
                reader.readAsDataURL(file);
            }
        }

        function saveProfile() {
            if (uploadedImageBase64) {
                localStorage.setItem('studentPic', uploadedImageBase64);
                updateUI();
                closeSettings();
                alert("✅ تم تحديث الصورة");
            }
        }

        function removeProfilePic() {
            if(confirm('حذف الصورة؟')) {
                localStorage.removeItem('studentPic');
                updateUI();
                document.getElementById('removePicBtn').classList.add('hidden');
            }
        }

        // ==== Server-based auth ====
        async function loadStudentMe() {
            const res = await fetch('/api/student/me', { credentials: 'include' });
            const data = await res.json().catch(()=> ({}));

            if (!res.ok || !data?.authenticated) {
                const reason = data?.reason || "unauthorized";
                if (reason === "expired") window.location.href = "payment.html";
                else window.location.href = "login.html";
                return null;
            }
            return data.student;
        }

        async function loadAcademyPublic() {
            const res = await fetch('/api/academy/public', { credentials: 'include' });
            const data = await res.json().catch(()=> ({}));
            if (!res.ok || !data?.result) return { years: [], subjects: [], teachers: [], chapters: [], lectures: [] };
            return data.result;
        }

        // ✅ تحكم: الطالب يتقفل على سنة/شعبة واحدة
        function applyStudentLock() {
            // جرّب تتعامل مع الحقول اللي ممكن تكون عندك:
            // - student.yearId (الأبسط)
            // - student.trackId (لو عندك شُعب: علمي علوم / علمي رياضة / أدبي / أزهر...)
            // هنا هنقفل على yearId أولاً لأنه موجود في الـ DB عندك (years/subjects مرتبطين بـ yearId).
            lockedYearId = student?.yearId || student?.trackYearId || null;

            // لو عندك نظام شُعب منفصل، ممكن تعرضه في badgeText في السيرفر
            // وتخلي API /api/academy/public ترجع فقط محتوى شعبة الطالب
            // لكن في الواجهة هنطبّق فلترة على السنة لو موجودة.

            if (lockedYearId) {
                currentPath.year = String(lockedYearId); // إجبار الدخول مباشرة لسنة الطالب
                currentPath.subject = null;
                currentPath.teacher = null;
                currentPath.class = null;
            }
        }

        // ==== Content display ====
        function displayMainContent() {
            const container = document.getElementById('view-content');
            const backBtn = document.getElementById('backBtn');
            const desc = document.getElementById('pageDescription');

            container.innerHTML = "";

            // === المستوى 1: السنوات (لو الطالب مش مقفول)
            if (!currentPath.year) {
                backBtn.style.display = "none";
                desc.innerText = "بوابة الأكاديمية - اختر السنة الدراسية";

                // ✅ لو الطالب مقفول على سنة: اعرضها فقط
                const years = lockedYearId
                    ? academyDB.years.filter(y => String(y.id) === String(lockedYearId))
                    : academyDB.years;

                years.forEach(year => {
                    container.innerHTML += `
                        <div class="glass-step p-10 group" onclick="selectYear('${escapeJs(year.id)}')">
                            <div class="step-icon">🗓️</div>
                            <h3 class="text-3xl font-black text-white">${escapeHtml(year.name)}</h3>
                            ${lockedYearId ? `<p class="text-slate-400 text-sm font-bold mt-3">✅ هذه هي شُعبتك/سنتك</p>` : ``}
                        </div>`;
                });
            }

            // === المستوى 2: المواد
            else if (currentPath.year && !currentPath.subject) {
                backBtn.style.display = lockedYearId ? "none" : "block";
                desc.innerText = "اختر المادة العلمية";

                const filtered = academyDB.subjects.filter(s => String(s.yearId) === String(currentPath.year));
                filtered.forEach(sub => {
                    container.innerHTML += `
                        <div class="glass-step p-10 group" onclick="selectSubject('${escapeJs(sub.id)}')">
                            <div class="step-icon">📚</div>
                            <h3 class="text-3xl font-black text-white">${escapeHtml(sub.name)}</h3>
                        </div>`;
                });
            }

            // === المستوى 3: المدرسين
            else if (currentPath.subject && !currentPath.teacher) {
                backBtn.style.display = "block";
                desc.innerText = "اختر المدرس";

                const filtered = academyDB.teachers.filter(t => String(t.subId) === String(currentPath.subject));
                filtered.forEach(teach => {
                    const teacherImg = teach.pic ? `<img src="${teach.pic}" class="w-full h-full object-cover">` : "👨‍🏫";
                    container.innerHTML += `
                        <div class="glass-step p-10 group" onclick="selectTeacher('${escapeJs(teach.id)}')">
                            <div class="w-32 h-32 bg-slate-800 rounded-full mx-auto mb-6 flex items-center justify-center text-5xl overflow-hidden border-2 border-teal-500/30">
                                ${teacherImg}
                            </div>
                            <h3 class="text-2xl font-black text-white text-center">${escapeHtml(teach.name)}</h3>
                        </div>`;
                });
            }

            // === المستوى 4: الفصول
            else if (currentPath.teacher && !currentPath.class) {
                backBtn.style.display = "block";
                desc.innerText = "اختر الفصل الدراسي";

                const filtered = academyDB.chapters.filter(c => String(c.teachId) === String(currentPath.teacher));
                filtered.forEach(chap => {
                    container.innerHTML += `
                        <div class="glass-step p-10 group" onclick="selectClass('${escapeJs(chap.id)}')">
                            <div class="step-icon">📁</div>
                            <h3 class="text-2xl font-black text-white text-center">${escapeHtml(chap.name)}</h3>
                            <p class="text-slate-400 text-sm font-bold mt-3 text-center">اضغط لعرض المحاضرات</p>
                        </div>`;
                });
            }

            // === المستوى 5: المحاضرات
            else if (currentPath.class) {
                backBtn.style.display = "block";
                desc.innerText = "المحاضرات المتاحة";

                const filtered = academyDB.lectures.filter(l => String(l.chapId) === String(currentPath.class));

                // ✅ ترتيب أفضل: order ثم id
                filtered.sort((a, b) => {
                    const oa = Number(a.order ?? a.lesson_order ?? 0);
                    const ob = Number(b.order ?? b.lesson_order ?? 0);
                    if (oa && ob) return oa - ob;
                    return String(a.id || '').localeCompare(String(b.id || ''));
                });

                filtered.forEach((lec, idx) => {
                    const videoId = lec.videoId || lec.video || "";
                    const title = lec.title || "";
                    const disabled = !videoId;

                    container.innerHTML += `
                        <div class="glass-step lecture-card p-8 group flex flex-col justify-between">
                            <div>
                                <div class="flex items-start justify-between gap-3">
                                    <div class="step-icon" style="margin-bottom:0;">🎬</div>
                                    <div class="text-[10px] font-black text-teal-300 bg-teal-500/10 border border-teal-500/10 px-2 py-1 rounded-xl">
                                        #${idx + 1}
                                    </div>
                                </div>

                                <h3 class="text-xl font-black text-white mt-5 mb-2 leading-snug">
                                    ${escapeHtml(title)}
                                </h3>

                                <div class="lecture-meta">
                                    ${disabled
                                        ? `⚠️ غير متاح حالياً`
                                        : `✅ جاهز للتشغيل`}
                                </div>
                            </div>

                            <button
                                class="lecture-btn mt-6 ${disabled ? 'lecture-disabled' : ''}"
                                ${disabled ? 'disabled' : ''}
                                onclick="playLesson('${escapeJs(videoId)}', '${escapeJs(title)}')">
                                ▶️ مشاهدة الآن
                            </button>
                        </div>`;
                });
            }

            if (container.innerHTML === "") {
                container.innerHTML = `<div class="empty-box col-span-full">لا يوجد محتوى مضاف حالياً.</div>`;
            }
        }

        function selectYear(id) {
            // ✅ لو الطالب مقفول: امنع تغيير السنة
            if (lockedYearId && String(id) !== String(lockedYearId)) {
                alert("⚠️ لا يمكن تغيير الشعبة/السنة بعد التسجيل.");
                return;
            }
            currentPath.year = id;
            currentPath.subject = null;
            currentPath.teacher = null;
            currentPath.class = null;
            displayMainContent();
        }

        function selectSubject(id) { currentPath.subject = id; currentPath.teacher = null; currentPath.class = null; displayMainContent(); }
        function selectTeacher(id) { currentPath.teacher = id; currentPath.class = null; displayMainContent(); }
        function selectClass(id) { currentPath.class = id; displayMainContent(); }

        function goBack() {
            // ✅ لو الطالب مقفول: متسمحش يرجع لاختيار السنة
            if (currentPath.class) currentPath.class = null;
            else if (currentPath.teacher) currentPath.teacher = null;
            else if (currentPath.subject) currentPath.subject = null;
            else if (currentPath.year) {
                if (lockedYearId) return; // ممنوع الرجوع لخطوة السنوات
                currentPath.year = null;
            }
            displayMainContent();
        }

        function playLesson(videoId, title) {
            if (!videoId) {
                alert("عذراً، الفيديو غير متاح حالياً.");
                return;
            }

            // ✅ خزّن آخر محاضرة + بياناتها عشان زر إكمال المشاهدة يشتغل فعلاً
            const last = {
                title: title || "",
                videoId: videoId || "",
                at: Date.now()
            };
            localStorage.setItem('lastLesson', JSON.stringify(last));
            localStorage.setItem('lastLessonName', title || "");

            const vid = encodeURIComponent(videoId);
            const t = encodeURIComponent(title);
            window.location.href = `player.html?videoId=${vid}&title=${t}`;
        }

        function resumeLastLesson() {
            const raw = localStorage.getItem('lastLesson');
            if (!raw) {
                alert("لم تبدأ أي محاضرة بعد.");
                return;
            }
            try {
                const last = JSON.parse(raw);
                if (!last?.videoId) {
                    alert("لا توجد محاضرة صالحة للاستكمال.");
                    return;
                }
                const vid = encodeURIComponent(last.videoId);
                const t = encodeURIComponent(last.title || "");
                window.location.href = `player.html?videoId=${vid}&title=${t}`;
            } catch {
                alert("حدث خطأ في بيانات آخر محاضرة.");
            }
        }

        function updateUI() {
            if(!student) return;

            const pic = localStorage.getItem('studentPic');

            document.getElementById('sideStudentName').innerText = student.name || "طالب";
            document.getElementById('welcomeName').innerText = student.name || "طالب";
            document.getElementById('stat-studentCode').innerText = student.code || "----";

            const walletVal = String(student.walletUsed || "0000000");
            document.getElementById('stat-wallet').innerText = walletVal.substring(0,4) + "****";

            const avatarDiv = document.getElementById('userAvatar');
            avatarDiv.innerHTML = pic ? `<img src="${pic}" class="w-full h-full object-cover">` : "👤";

            // حالة الاشتراك من السيرفر
            document.getElementById('studentRank').innerText = student.badgeText || (student.isActive ? "مشترك نشط ⚡" : "غير نشط");

            if (student.expiryAt) {
                const exp = new Date(student.expiryAt);
                document.getElementById('expiryInfo').innerText = "ينتهي الاشتراك في: " + exp.toLocaleDateString('ar-EG');
            } else {
                document.getElementById('expiryInfo').innerText = "";
            }

            // إجمالي المحاضرات (محتوى المنصة) — لو عايزها محاضرات شعبة الطالب فقط، فلتر بالـ lockedYearId على السيرفر
            document.getElementById('stat-lessons').innerText = (academyDB.lectures || []).length;

            // آخر محاضرة
            const raw = localStorage.getItem('lastLesson');
            if (raw) {
                try {
                    const last = JSON.parse(raw);
                    document.getElementById('lastLessonName').innerText = last.title || "ابدأ رحلتك اليوم";
                    const d = new Date(last.at || Date.now());
                    document.getElementById('lastLessonMeta').innerText = "آخر مشاهدة: " + d.toLocaleString('ar-EG');
                } catch {
                    document.getElementById('lastLessonName').innerText = localStorage.getItem('lastLessonName') || "ابدأ رحلتك اليوم";
                    document.getElementById('lastLessonMeta').innerText = "";
                }
            } else {
                document.getElementById('lastLessonName').innerText = localStorage.getItem('lastLessonName') || "ابدأ رحلتك اليوم";
                document.getElementById('lastLessonMeta').innerText = "";
            }

            displayMainContent();
        }

        async function logout() {
            await fetch('/api/auth/logout', { method:'POST', credentials:'include' }).catch(()=>{});
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
        }
        function escapeJs(s) {
            return String(s ?? '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'\\r');
        }

        window.onload = async () => {
            // 1) auth من السيرفر
            student = await loadStudentMe();
            if(!student) return;

            // ✅ تطبيق قفل الشعبة/السنة
            applyStudentLock();

            // 2) db public من السيرفر
            academyDB = await loadAcademyPublic();

            // 3) اخفاء overlay
            document.getElementById('loadingOverlay').style.display = 'none';

            // 4) UI
            updateUI();
        };
    </script>

</body>
</html>
