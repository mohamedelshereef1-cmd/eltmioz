<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <title>مدرسينا | أكاديمية التميز</title>
    <style>
        :root { --accent: #0d9488; --bg-dark: #050a18; --card-bg: #111827; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-dark); color: white; min-height: 100vh; }

        /* حاوية الكروت */
        .teachers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        /* كارت المدرس الكبير */
        .teacher-card {
            background: var(--card-bg);
            border-radius: 35px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .teacher-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* حاوية الصورة */
        .teacher-image-wrapper {
            width: 100%;
            height: 380px; /* كارت كبير */
            position: relative;
            background: #1e293b;
        }

        .teacher-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* الصورة تأخذ كامل المساحة */
            object-position: top;
        }

        /* طبقة تظليل فوق الصورة */
        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, var(--card-bg), transparent);
        }

        /* تفاصيل المدرس */
        .teacher-info {
            padding: 25px;
            text-align: center;
            position: relative;
            margin-top: -60px; /* لرفع النص فوق التظليل */
            z-index: 10;
        }

        .teacher-name {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .subject-tag {
            background: rgba(13, 148, 136, 0.2);
            color: var(--accent);
            display: inline-block;
            padding: 4px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
            border: 1px solid rgba(13, 148, 136, 0.3);
        }

        /* الزر الفخم */
        .view-lessons-btn {
            background: white;
            color: black;
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s;
        }

        .view-lessons-btn:hover {
            background: var(--accent);
            color: white;
        }

        .back-btn {
            background: rgba(255,255,255,0.05);
            padding: 10px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }
        .back-btn:hover { background: var(--accent); }
    </style>
</head>
<body class="p-6">

    <header class="max-w-7xl mx-auto mb-12 flex justify-between items-end">
        <div class="text-right">
            <h1 class="text-4xl font-black mb-2">مدرسينا <span class="text-teal-500">المبدعين</span></h1>
            <p class="text-slate-400 font-bold">اختر مدرسك المفضل لاستكشاف محاضراته</p>
        </div>
        <button onclick="history.back()" class="back-btn font-bold">← رجوع</button>
    </header>

    <div id="teachersGrid" class="teachers-grid max-w-7xl mx-auto">
        </div>

    <script>
        // جلب معرف المادة من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const subjectId = urlParams.get('subjectId');

        function renderTeachers() {
            const grid = document.getElementById('teachersGrid');
            
            // جلب قاعدة البيانات الموحدة
            const db = JSON.parse(localStorage.getItem('academyDB')) || { teachers: [], subjects: [] };
            
            // فلترة المدرسين الذين يتبعون هذه المادة فقط
            const filteredTeachers = db.teachers.filter(t => t.subId == subjectId);

            // جلب اسم المادة للعرض (اختياري)
            const subject = db.subjects.find(s => s.id == subjectId);

            if (filteredTeachers.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-32 opacity-40">
                        <div class="text-6xl mb-4">👨‍🏫</div>
                        <h3 class="text-2xl font-bold">لا يوجد مدرسون مضافون لهذه المادة حالياً</h3>
                    </div>`;
                return;
            }

            grid.innerHTML = filteredTeachers.map(teacher => `
                <div class="teacher-card">
                    <div class="teacher-image-wrapper">
                        <img src="${teacher.pic || 'https://via.placeholder.com/400x600?text=Teacher+Image'}" 
                             class="teacher-img" 
                             alt="${teacher.name}">
                        <div class="image-overlay"></div>
                    </div>
                    
                    <div class="teacher-info">
                        <h3 class="teacher-name">${teacher.name}</h3>
                        <div class="subject-tag">${subject ? subject.name : 'مدرس المادة'}</div>
                        
                        <button onclick="goToChapters('${teacher.id}')" class="view-lessons-btn">
                            عرض الفصول الدراسية
                            <span class="text-2xl">›</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function goToChapters(teacherId) {
            // الانتقال لصفحة الفصول (Chapters) مع تمرير معرف المدرس
            location.href = `chapters.html?teacherId=${teacherId}`;
        }

        window.onload = renderTeachers;
    </script>
</body>
</html>
