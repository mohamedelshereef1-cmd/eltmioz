<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحاضرات | منصة التميز</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* إضافة بعض التنسيقات السريعة لتناسب لوحة التحكم */
        body { font-family: 'Cairo', sans-serif; background: #f1f5f9; }
        .highlight { color: #0d9488; font-weight: bold; }
        .lesson-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .lesson-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .btn-secondary { background: #0d9488; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        .btn-icon { color: #64748b; text-decoration: none; font-size: 0.9rem; border: 1px solid #cbd5e1; padding: 8px 15px; border-radius: 10px; }
        .locked-state { text-align: center; padding: 50px; background: white; border-radius: 30px; }
    </style>
</head>
<body>
    <header class="app-header glassmorphism-card">
        <div class="logo">منصة <span class="highlight">التميز</span></div>
        <nav class="main-nav">
            <a href="/index.html" class="nav-item">الرئيسية</a>
            <a href="/teachers.html" class="nav-item">المدرسون</a>
            <span id="studentNameDisplay" class="nav-item">أهلاً، طالب جديد</span>
        </nav>
    </header>

    <main class="container">
        <h1 class="page-title"><span id="courseTitle" class="highlight">جاري التحميل...</span></h1>
        <p id="courseDescription" class="card-description"></p>
        
        <div id="lessonsList" class="lessons-list">
            </div>
    </main>

    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. التأكد من هوية الطالب وحالة التفعيل
            const isActivated = localStorage.getItem('isActivated') === 'true'; // نفترض حفظ الحالة عند الدخول
            const token = localStorage.getItem('authToken');

            if (!isActivated) {
                document.getElementById('lessonsList').innerHTML = `
                    <div class="locked-state">
                        <div style="font-size: 50px;">🔒</div>
                        <h2>المحتوى مغلق</h2>
                        <p>عذراً، يجب تفعيل الاشتراك أولاً لمشاهدة محاضرات هذا المدرس.</p>
                        <button class="btn-secondary" onclick="window.location.href='/payment.html'">انتقل لصفحة التفعيل الآن</button>
                    </div>
                `;
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const teacherId = urlParams.get('teacherId');
            
            if (!teacherId) {
                document.getElementById('lessonsList').innerHTML = '<p class="error-state">المدرس غير محدد.</p>';
                return;
            }

            try {
                const response = await fetch(`/api/admin/courses/${teacherId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const courses = await response.json();

                if (!courses || courses.length === 0) {
                    document.getElementById('lessonsList').innerHTML = '<p class="empty-state">لا توجد كورسات متاحة لهذا المدرس حالياً.</p>';
                    return;
                }

                const course = courses[0];
                document.getElementById('courseTitle').innerText = course.title;
                document.getElementById('courseDescription').innerText = course.description;

                const lessonsResponse = await fetch(`/api/admin/lessons/${course.id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const lessons = await lessonsResponse.json();

                const lessonsList = document.getElementById('lessonsList');
                lessonsList.innerHTML = '';

                lessons.forEach(lesson => {
                    const lessonCard = document.createElement('div');
                    lessonCard.className = 'lesson-card';
                    lessonCard.innerHTML = `
                        <div class="lesson-info">
                            <h3 class="card-title">${lesson.lesson_order}. ${lesson.title}</h3>
                            <span style="font-size: 12px; color: #64748b;">مدة الفيديو: ${lesson.duration || '--'} دقيقة</span>
                        </div>
                        <div class="lesson-actions">
                            ${lesson.pdf_url ? `<a href="${lesson.pdf_url}" target="_blank" class="btn-icon">📄 ملزمة PDF</a>` : ''}
                            <button class="btn-secondary" onclick="viewVideo('${lesson.video_id}')">▶️ مشاهدة الآن</button>
                        </div>
                    `;
                    lessonsList.appendChild(lessonCard);
                });

            } catch (error) {
                console.error('Failed to load:', error);
                document.getElementById('lessonsList').innerHTML = '<p class="error-state">حدث خطأ في تحميل المحاضرات.</p>';
            }

            const studentName = localStorage.getItem('studentName') || 'طالب جديد';
            document.getElementById('studentNameDisplay').innerText = `أهلاً، ${studentName}`;
        });

        function viewVideo(videoId) {
            window.location.href = `/player.html?videoId=${videoId}`;
        }
    </script>
</body>
</html>
