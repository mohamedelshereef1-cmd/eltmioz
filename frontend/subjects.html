<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <title>المواد الدراسية | أكاديمية التميز</title>
    <style>
        :root { --accent: #0d9488; --card-dark: #111827; --bg-dark: #050a18; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-dark); color: white; }

        /* حاوية الكروت */
        .subjects-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        /* تصميم الكارت المطابق للصورة */
        .subject-card {
            background: var(--card-dark);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s transform;
        }
        .subject-card:hover { transform: translateY(-5px); }

        /* الجزء العلوي الأبيض (للصورة) */
        .card-top {
            background: #ffffff; /* أبيض تماماً مثل الصورة */
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #10b981;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 12px;
            z-index: 10;
        }

        .subject-img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        /* الجزء السفلي (المعلومات) */
        .card-bottom {
            padding: 20px;
            text-align: right;
        }

        .year-label {
            color: #64748b;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .subject-title {
            font-size: 22px;
            font-weight: 900;
            color: white;
            margin-bottom: 15px;
        }

        .extra-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #94a3b8;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* الزر الأبيض */
        .action-btn {
            background: white;
            color: black;
            width: 100%;
            padding: 14px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s opacity;
        }
        .action-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <header class="p-8 text-right">
        <h1 class="text-3xl font-black mb-2">المواد الدراسية</h1>
        <p class="text-slate-400">اختر المادة وابدأ رحلة التفوق</p>
    </header>

    <div id="subjectsGrid" class="subjects-container">
        </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const yearId = urlParams.get('yearId');

        function loadSubjects() {
            // جلب البيانات من academyDB (لوحة المالك)
            const db = JSON.parse(localStorage.getItem('academyDB')) || { subjects: [] };
            const grid = document.getElementById('subjectsGrid');
            
            // تصفية المواد حسب السنة
            const filtered = db.subjects.filter(s => s.yearId == yearId);

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 opacity-30 font-bold">لم تضف أي مواد لهذه السنة بعد من لوحة التحكم.</div>`;
                return;
            }

            grid.innerHTML = filtered.map(sub => `
                <div class="subject-card">
                    <div class="card-top">
                        <div class="status-badge">متاح الآن</div>
                        <img src="${sub.image || 'https://via.placeholder.com/200?text=لوجو+المادة'}" class="subject-img" alt="${sub.name}">
                    </div>
                    
                    <div class="card-bottom">
                        <div class="year-label">2026</div>
                        <h3 class="subject-title">${sub.name}</h3>
                        
                        <div class="extra-info">
                            <span>ترم أول</span>
                            <span>📖 أونلاين</span>
                        </div>

                        <button onclick="location.href='teachers.html?subjectId=${sub.id}'" class="action-btn">
                            عرض المدرسين 
                            <span class="text-xl">›</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.onload = loadSubjects;
    </script>
</body>
</html>
