<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <title>الدعم الفني | أكاديمية التميز</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; transition: 0.3s; cursor: pointer; display: flex; align-items: center; gap: 1rem; padding: 1.5rem; }
        .card:hover { border-color: #0d9488; background: rgba(255,255,255,0.08); transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <div class="text-6xl mb-4">🎧</div>
            <h1 class="text-3xl font-black text-teal-500">مركز الدعم الفني</h1>
            <p class="text-slate-400 mt-2 font-bold">نحن هنا لمساعدتك في أي وقت</p>
        </div>

        <div id="supportLinks" class="space-y-4">
            </div>

        <button onclick="history.back()" class="w-full mt-8 py-4 text-slate-500 font-bold hover:text-white transition-all">
            ← العودة للوحة التحكم
        </button>
    </div>
    
    <script>
        // جلب البيانات من academyDB المحدثة
        const db = JSON.parse(localStorage.getItem('academyDB')) || {};
        const config = db.support || {
            phones: [],
            teleLinks: []
        };

        const container = document.getElementById('supportLinks');
        let htmlContent = "";

        // 1. معالجة أرقام الهاتف والواتساب الديناميكية
        if (config.phones && config.phones.length > 0) {
            config.phones.forEach(num => {
                htmlContent += `
                <a href="https://wa.me/${num}" target="_blank" class="card">
                    <span class="text-3xl">💬</span>
                    <div>
                        <h3 class="font-black text-white text-lg">واتساب الدعم</h3>
                        <p class="text-xs text-slate-400">${num}</p>
                    </div>
                </a>
                <a href="tel:${num}" class="card">
                    <span class="text-3xl">📞</span>
                    <div>
                        <h3 class="font-black text-white text-lg">اتصال هاتفي</h3>
                        <p class="text-xs text-slate-400">للحالات الطارئة</p>
                    </div>
                </a>`;
            });
        }

        // 2. معالجة روابط التلجرام الديناميكية
        if (config.teleLinks && config.teleLinks.length > 0) {
            config.teleLinks.forEach(link => {
                htmlContent += `
                <a href="${link}" target="_blank" class="card">
                    <span class="text-3xl">✈️</span>
                    <div>
                        <h3 class="font-black text-white text-lg">رابط تلجرام</h3>
                        <p class="text-xs text-slate-400">تواصل مباشر أو انضمام للقناة</p>
                    </div>
                </a>`;
            });
        }

        // تحديث الحاوية بالبيانات
        container.innerHTML = htmlContent;

        // حالة عدم وجود بيانات
        if (container.innerHTML.trim() === "") {
            container.innerHTML = "<p class='text-center text-slate-500 font-bold'>لا توجد وسائل تواصل مضافة حالياً.</p>";
        }
    </script>
</body>
</html>
