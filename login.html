<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <title>تسجيل الدخول | أكاديمية التميز</title>

  <style>
    :root { --accent: #0d9488; --dark-bg: #020617; }
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--dark-bg);
      color: white;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
    }

    .login-card {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      padding: 2.5rem;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .input-field {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      transition: 0.3s;
    }
    .input-field:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.2);
    }

    .btn-primary {
      background: var(--accent);
      transition: 0.25s;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(13, 148, 136, 0.4);
    }
    .btn-primary:disabled{
      opacity: .7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .support-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }
    .support-btn:hover {
      background: rgba(255,255,255,0.1);
    }

    .hint {
      font-size: 12px;
      color: rgba(255,255,255,.65);
      font-weight: 800;
      margin-top: 10px;
      text-align: center;
      min-height: 18px;
    }

    .toast {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      font-weight: 900;
      font-size: 12px;
      text-align: center;
      display: none;
      line-height: 1.6;
    }
    .toast.show{ display:block; }
    .toast.ok{ border-color: rgba(16,185,129,.25); background: rgba(16,185,129,.12); color: #a7f3d0; }
    .toast.err{ border-color: rgba(239,68,68,.25); background: rgba(239,68,68,.12); color: #fecaca; }
    .toast.warn{ border-color: rgba(245,158,11,.25); background: rgba(245,158,11,.12); color: #fde68a; }

    .tiny {
      font-size: 11px;
      color: rgba(148,163,184,1);
      font-weight: 800;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <div class="login-card mx-4">
    <div class="text-center mb-8">
      <div class="text-5xl mb-4">🚀</div>
      <h1 class="text-3xl font-black mb-2">مرحباً بك مجدداً</h1>
      <p class="text-slate-400 font-bold">أدخل كود التفعيل الخاص بك للدخول</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
      <div>
        <label class="block text-sm font-bold text-slate-300 mb-2">كود الطالب</label>
        <input
          type="text"
          id="studentCode"
          required
          autocomplete="one-time-code"
          class="input-field w-full p-4 rounded-2xl text-center text-xl font-bold tracking-widest"
          placeholder="EX: ACC-XXXXXX"
          inputmode="latin"
          autocapitalize="characters"
          spellcheck="false"
        >
        <div class="tiny">معلومة: الكود غير حساس لحالة الأحرف (CAPS/Small)</div>
      </div>

      <button type="submit" id="loginBtn" class="btn-primary w-full py-4 rounded-2xl font-black text-lg">
        دخول الأكاديمية
      </button>

      <div id="msg" class="hint"></div>
      <div id="toast" class="toast"></div>
    </form>

    <!-- الاشتراك + الدعم -->
    <div class="mt-8 pt-6 border-t border-white/10 text-center">
      <p class="text-slate-400 text-sm mb-4 font-bold">ليس لديك كود تفعيل؟</p>

      <div class="flex flex-col gap-3 items-center">

        <a href="payment.html"
           class="inline-block text-teal-400 font-black hover:text-teal-300 transition-colors">
          اشترك الآن وابدأ رحلتك التعليمية ⚡
        </a>

        <a href="support.html"
           class="support-btn inline-flex items-center justify-center gap-2 w-full max-w-xs
                  py-3 rounded-2xl font-black text-slate-200">
          🎧 الدعم الفني والشكاوى
        </a>

      </div>
    </div>
  </div>

<script>
  // =============================
  // UI helpers
  // =============================
  function setMsg(text) {
    document.getElementById('msg').textContent = text || '';
  }

  function showToast(type, text) {
    const t = document.getElementById('toast');
    t.className = 'toast show ' + (type || '');
    t.textContent = text || '';
  }

  function hideToast() {
    const t = document.getElementById('toast');
    t.className = 'toast';
    t.textContent = '';
  }

  function normalizeCode(code) {
    // ✅ توحيد الشكل: إزالة المسافات + Uppercase
    return String(code || '')
      .trim()
      .replace(/\s+/g, '')
      .toUpperCase();
  }

  async function fetchJSON(url, options = {}) {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 15000);

    try {
      const res = await fetch(url, {
        credentials: 'include',
        signal: controller.signal,
        ...options,
      });
      const data = await res.json().catch(() => ({}));
      return { res, data };
    } catch (e) {
      return { res: null, data: { error: 'network_error' } };
    } finally {
      clearTimeout(timeout);
    }
  }

  // =============================
  // Auto redirect if already logged in
  // =============================
  async function redirectIfLoggedIn() {
    const { res, data } = await fetchJSON('/api/student/me');
    if (res && res.ok && data?.authenticated) {
      window.location.href = 'index.html';
    }
  }

  // =============================
  // Login
  // =============================
  async function handleLogin(event) {
    event.preventDefault();

    const loginBtn = document.getElementById('loginBtn');
    const codeInput = document.getElementById('studentCode');

    // ✅ Normalize input
    const code = normalizeCode(codeInput.value);

    if (!code) return;

    hideToast();
    setMsg('');
    loginBtn.textContent = 'جاري التحقق...';
    loginBtn.disabled = true;

    // ✅ حافظ على UI متناسق: خزن آخر كود مكتوب (اختياري)
    try { localStorage.setItem('lastLoginCode', code); } catch {}

    const { res, data } = await fetchJSON('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });

    if (!res) {
      showToast('err', '⚠️ مشكلة في الاتصال بالسيرفر. جرّب تاني.');
      loginBtn.textContent = 'دخول الأكاديمية';
      loginBtn.disabled = false;
      return;
    }

    if (!res.ok) {
      const reason = data?.reason || 'invalid';

      // ✅ رسائل أوضح + نفس تحويلاتك
      if (reason === 'expired') {
        showToast('warn', '⚠️ انتهت مدة الاشتراك. سيتم تحويلك لصفحة التفعيل.');
        setTimeout(() => window.location.href = 'payment.html', 600);
        return;
      }

      if (reason === 'device_locked') {
        showToast('err', '🛡️ الحساب مرتبط بجهاز آخر. تواصل مع الإدارة لفك الربط.');
      } else if (reason === 'banned') {
        showToast('err', '⛔ تم حظر الحساب. تواصل مع الدعم لمعرفة السبب.');
      } else {
        showToast('err', '❌ الكود غير صحيح. راجع الكود وحاول مرة أخرى.');
      }

      loginBtn.textContent = 'دخول الأكاديمية';
      loginBtn.disabled = false;
      return;
    }

    // ✅ نجاح
    showToast('ok', '✅ تم تسجيل الدخول بنجاح... جاري التحويل');

    const redirectTo = data?.redirectTo || 'index.html';
    setTimeout(() => window.location.href = redirectTo, 350);
  }

  // =============================
  // UX improvements
  // =============================
  window.onload = async () => {
    // ملء آخر كود (اختياري)
    try {
      const last = localStorage.getItem('lastLoginCode');
      if (last) document.getElementById('studentCode').value = last;
    } catch {}

    // لو logged in already
    await redirectIfLoggedIn();

    // تحسين: Enter + auto normalize on blur
    const inp = document.getElementById('studentCode');
    inp.addEventListener('blur', () => {
      inp.value = normalizeCode(inp.value);
    });

    // منع إدخال مسافات
    inp.addEventListener('input', () => {
      const v = inp.value;
      if (/\s/.test(v)) inp.value = v.replace(/\s+/g, '');
    });
  };
</script>

</body>
</html>
