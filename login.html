<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <title>تسجيل الدخول | أكاديمية التميز</title>
    <style>
        :root { --accent: #0d9488; --dark-bg: #020617; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark-bg); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        .login-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.2);
        }

        .btn-primary {
            background: var(--accent);
            transition: 0.4s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(13, 148, 136, 0.4);
        }
    </style>
</head>
<body>

    <div class="login-card mx-4">
        <div class="text-center mb-8">
            <div class="text-5xl mb-4">🚀</div>
            <h1 class="text-3xl font-black mb-2">مرحباً بك مجدداً</h1>
            <p class="text-slate-400 font-bold">أدخل كود التفعيل الخاص بك للدخول</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-2">كود الطالب</label>
                <input type="text" id="studentCode" required 
                    class="input-field w-full p-4 rounded-2xl text-center text-xl font-bold tracking-widest" 
                    placeholder="EX: AC-XXXXXX">
            </div>

            <button type="submit" id="loginBtn" class="btn-primary w-full py-4 rounded-2xl font-black text-lg">
                دخول الأكاديمية
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-white/10 text-center">
            <p class="text-slate-400 text-sm mb-4 font-bold">ليس لديك كود تفعيل؟</p>
            <a href="payment.html" class="inline-block text-teal-400 font-black hover:text-teal-300 transition-colors">
                اشترك الآن وابدأ رحلتك التعليمية ⚡
            </a>
        </div>
    </div>

    <script>
        // دالة لجلب الـ IP الحقيقي للطالب
        async function getRealIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (e) {
                return null;
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            const loginBtn = document.getElementById('loginBtn');
            const code = document.getElementById('studentCode').value.trim();
            
            loginBtn.innerText = "جاري التحقق من الأمان...";
            loginBtn.disabled = true;

            // 1. جلب الـ IP الحالي للجهاز
            const currentIP = await getRealIP();
            if (!currentIP) {
                alert("❌ فشل الاتصال بخادم الأمان. تأكد من الإنترنت.");
                loginBtn.innerText = "دخول الأكاديمية";
                loginBtn.disabled = false;
                return;
            }

            // جلب قاعدة البيانات
            const db = JSON.parse(localStorage.getItem('academyDB')) || { users: [] };
            const student = db.users.find(u => u.code === code);

            if (student) {
                // 2. حماية الـ IP (قفل الحساب على الجهاز الحالي)
                if (!student.registeredIP) {
                    student.registeredIP = currentIP; // ربط الـ IP لأول مرة
                    localStorage.setItem('academyDB', JSON.stringify(db));
                } else if (student.registeredIP !== currentIP) {
                    alert("🛡️ عذراً، هذا الحساب مرتبط بجهاز آخر. تواصل مع الإدارة لتغيير الجهاز.");
                    loginBtn.innerText = "دخول الأكاديمية";
                    loginBtn.disabled = false;
                    return;
                }

                // 3. التحقق من انتهاء الصلاحية (بالثواني)
                const now = new Date();
                const expiry = new Date(student.expiryDate);
                
                if (now > expiry) {
                    alert("⚠️ انتهت مدة صلاحية الكود الخاص بك.");
                    window.location.href = 'payment.html';
                    return;
                }

                // 4. نجاح تسجيل الدخول
                localStorage.setItem('currentUser', JSON.stringify({
                    name: student.name,
                    code: student.code
                }));

                window.location.href = 'Index.html';

            } else {
                alert("❌ الكود الذي أدخلته غير صحيح أو غير مفعل.");
                loginBtn.innerText = "دخول الأكاديمية";
                loginBtn.disabled = false;
            }
        }

        window.onload = () => {
            if (localStorage.getItem('currentUser')) {
                window.location.href = 'Index.html';
            }
        };
    </script>
</body>
</html>
